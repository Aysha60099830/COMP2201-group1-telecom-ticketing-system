<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Telecom | Support Portal</title>
    <link rel="stylesheet" href="/CSS/layout.css">
    <link rel="stylesheet" href="/CSS/submit & track.css">
    <script src="/js/submit & track.js"></script>
</head>

<body>

    <header>
        <div class="logo">
            <a href="/html/index.html">
                <img src="/images/logo-V2.png" alt="Telecom Company Logo">
            </a>
        </div>
        <h1>submit & track </h1>
        <nav>
            <ul>
                <li><a href="/html/index.html">Home</a></li>
                <li><a href="/html/contact support.html">Contact Support</a></li>
                <li><a href="/html/submit & track.html">Submit & track Ticket</a></li>


            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="main-layout">

            <div class="content-area">
                <section id="submit-section" class="portal-section">
                    <h2 class="section-title">Submit a New Ticket</h2>
                    <form id="ticketForm" class="support-card">
                        <label for="userName"><strong>Full Name:</strong></label>
                        <input type="text" id="userName" class="input-field" placeholder="Enter your name" required>

                        <label for="issueDesc"><strong>Issue Description:</strong></label>
                        <textarea id="issueDesc" class="input-field textarea-field"
                            placeholder="Describe your technical issue..." required></textarea>

                        <button type="submit" class="btn">Submit Ticket</button>
                    </form>
                    <div id="submission-result" class="result-msg"></div>
                </section>

                <hr class="divider">

                <section id="track-section" class="portal-section">
                    <h2 class="section-title">Track Existing Ticket</h2>
                    <div class="support-card">
                        <label for="ticketIdInput"><strong>Enter Ticket ID:</strong></label>
                        <input type="text" id="ticketIdInput" class="input-field" placeholder="e.g., TKT-1234">
                        <button id="trackBtn" class="btn">Track Status</button>

                        <div id="tracking-result" class="status-box"></div>
                    </div>
                </section>
            </div>

            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3 class="sidebar-title">Recent Submissions</h3>
                    <button id="clearAllBtn" class="delete-link">Clear All</button>
                </div>
                <ul id="ticketList" class="ticket-ul">
                    <li class="empty-msg">No tickets submitted yet.</li>
                </ul>
            </aside>

        </div>
    </main>

    <!-- ===== Footer ===== -->
    <footer>
        <section class="social-media">
            <h2>Contact & Social Channels</h2>

            <div class="social-icons">
                <a href="#"><img src="/images/github.jpg" alt="github"></a>
                <a href="#"><img src="/images/X (twitter).jpg" alt="Twitter"></a>
                <a href="#"><img src="/images/3840px-LinkedIn_icon.svg.jpg" alt="LinkedIn"></a>
            </div>
        </section>

        <p>&copy; Telecom Support Services | External Partner Portal</p>
    </footer>
</body>

</html>
